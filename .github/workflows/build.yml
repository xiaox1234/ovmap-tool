name: Build and Release EXE

on:
  push:
    branches: [ "main" ]  # 当 main 分支有推送时触发
  workflow_dispatch:      # 允许在 GitHub Actions 页面手动触发

jobs:
  build:
    runs-on: windows-latest  # 直接在 Windows 环境打包，最稳妥
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'  # 推荐使用 3.10，兼容性好

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 使用 spec 文件打包为 EXE
        run: |
          pyinstaller ovital_tool.spec

      - name: 上传 EXE 文件作为构建产物
        uses: actions/upload-artifact@v4
        with:
          name: OvitalMapTool-Windows
          path: dist/OvitalMapTool.exe
