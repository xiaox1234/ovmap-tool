name: Build and Release EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 使用spec文件打包EXE
        run: |
          pyinstaller ovital_tool.spec

      - name: 上传EXE产物
        uses: actions/upload-artifact@v4
        with:
          name: OvitalMapTool-Windows
          path: dist/OvitalMapTool.exe
          retention-days: 30
